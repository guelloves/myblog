<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <!-- External CSS (simulated but fully functional as embedded for portability) -->
    <style>
        /* -----------------------------------------------
           EXTERNAL STYLE.CSS — MESSY + AESTHETIC + CHAOS
        ----------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: #0c0b10;
            font-family: 'Courier New', 'Fira Code', 'Space Mono', 'Comic Neue', monospace;
            overflow-x: hidden;
            position: relative;
            color: #e3e0e8;
            padding: 2rem 1.5rem;
        }

        /* GRAIN / NOISE OVERLAY (UNHINGED TEXTURE) */
        .static-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.12;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuNCIvPjwvc3ZnPg==');
            background-repeat: repeat;
            mix-blend-mode: overlay;
        }

        /* SCANNING LINES */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,200,0.03) 0px, rgba(0,255,200,0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 998;
        }

        /* container */
        .chaos-container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* HEADER — GLITCH, TAPE, SCRAMBLE */
        .dump-header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
            transform: rotate(-0.8deg) skewX(-1deg);
            border-left: 8px solid #ff3b6f;
            border-right: 4px solid #6effb0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            padding: 1.8rem 1rem;
            box-shadow: 12px 12px 0 rgba(255, 59, 111, 0.4), -6px -6px 0 rgba(110, 255, 176, 0.3);
        }

        .glitch {
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            color: #f5e56b;
            text-shadow: 4px 4px 0 #ff3b6f, -2px -2px 0 #1effbc;
            animation: glitchShake 0.22s infinite alternate;
        }

        @keyframes glitchShake {
            0% { transform: translate(1px, -1px); text-shadow: 3px 2px 0 #ff3b6f, -2px -1px 0 cyan; }
            100% { transform: translate(-1px, 1px); text-shadow: -2px 3px 0 magenta, 1px -2px 0 #0aff9e; }
        }

        .subdump {
            font-family: monospace;
            font-size: 1rem;
            background: #000000aa;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            margin-top: 1rem;
            border-left: 6px solid hotpink;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
        }

        /* GRID — BLOG & DUMP ZONES */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 850px) {
            .two-columns {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
            body {
                padding: 1rem;
            }
        }

        /* SECTION HEADERS */
        .section-title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 3px dotted #f0f;
            display: inline-block;
            margin-bottom: 1.8rem;
            transform: rotate(-0.5deg);
            letter-spacing: -0.5px;
        }

        /* BLOG POSTS — CRUMPLED PAPER VIBE */
        .blog-posts-area {
            background: rgba(15, 12, 25, 0.6);
            padding: 0.5rem;
            border-radius: 32px 8px 32px 8px;
            box-shadow: 0 0 0 2px #ff3b6f55, inset 0 0 20px rgba(0,0,0,0.6);
        }

        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .blog-card {
            background: #1e1a2fdd;
            backdrop-filter: blur(8px);
            padding: 1.5rem;
            border-left: 12px solid #ffcc00;
            transform: rotate(var(--rot, 0deg));
            transition: all 0.2s ease;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.3), 0 0 0 1px #ff66aa44;
            position: relative;
            border-radius: 3px 18px 3px 18px;
        }

        .blog-card:hover {
            transform: rotate(0deg) scale(1.01);
            background: #2a2442dd;
            box-shadow: 12px 12px 0px #ff3b6f;
        }

        .blog-title {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(120deg, #ffe6b0, #ffb37c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .blog-meta {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #fb8b67;
            border-bottom: 1px dashed #ff77aa;
            display: inline-block;
            margin-bottom: 0.9rem;
            letter-spacing: 2px;
        }

        .blog-excerpt {
            font-size: 0.9rem;
            line-height: 1.5;
            font-family: monospace;
            color: #cdd1e6;
        }

        .delete-btn, .remove-dump {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff2a5e;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            width: 28px;
            height: 28px;
            border-radius: 100%;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: monospace;
            box-shadow: 0 0 0 2px black;
        }

        .delete-btn:hover, .remove-dump:hover {
            background: #ff0000;
            transform: scale(1.2) rotate(90deg);
        }

        /* DIGITAL DUMP STICKY ZONE */
        .dump-zone {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px 8px 28px 8px;
            padding: 1rem;
            border: 1px solid #f0b27a66;
        }

        .dump-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
            max-height: 500px;
            overflow-y: auto;
            padding: 0.4rem;
        }

        .dump-note {
            background: #f9eec1;
            color: #1d1b2b;
            padding: 1rem 1rem 1rem 1.5rem;
            font-family: 'Comic Neue', 'Courier New', monospace;
            font-weight: bold;
            border-radius: 2px 18px 2px 18px;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.2);
            transform: rotate(var(--rot, 0deg));
            transition: 0.1s linear;
            position: relative;
            word-break: break-word;
            border-right: 5px solid #ff8866;
        }

        .dump-note:hover {
            transform: rotate(0deg) scale(1.01);
            background: #fff2d2;
            box-shadow: 10px 10px 0 #ff5252;
        }

        .dump-text {
            font-size: 0.95rem;
        }

        /* chaos input group */
        .dump-input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .dump-input-group input {
            flex: 2;
            background: #2a2438;
            border: 2px solid #ffaa66;
            padding: 0.8rem;
            color: #ffffbb;
            font-family: monospace;
            outline: none;
        }

        .chaos-btn {
            background: #ff4d6d;
            border: none;
            padding: 0.7rem 1.4rem;
            font-weight: bold;
            font-family: monospace;
            color: black;
            letter-spacing: 1px;
            transition: 0.1s;
            box-shadow: 3px 3px 0 #2c1a2e;
            cursor: pointer;
        }

        .chaos-btn:hover {
            background: #ff9100;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 black;
        }

        /* UNHINGED BUTTON BAR */
        .chaos-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 3rem 0 2rem;
        }

        .glitch-btn {
            background: #111;
            border: 1px solid magenta;
            padding: 0.8rem 1.7rem;
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
            color: cyan;
            transition: 0.07s linear;
        }

        .glitch-btn:active {
            transform: scale(0.96);
            background: magenta;
            color: black;
        }

        /* floating scrap elements (absolute messy) */
        .floating-junk {
            position: fixed;
            bottom: 5%;
            left: 2%;
            background: #fa0e5e;
            color: #fff7d0;
            padding: 6px 12px;
            font-size: 0.7rem;
            rotate: -12deg;
            z-index: 99;
            font-family: monospace;
            font-weight: bold;
            pointer-events: none;
            animation: wobble 4s infinite;
        }

        .floating-junk2 {
            position: fixed;
            top: 12%;
            right: 1%;
            background: #2effb0;
            color: #0a0f1e;
            padding: 12px 18px;
            rotate: 22deg;
            font-size: 1rem;
            font-weight: bold;
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 98;
            animation: blinkFloat 3s infinite;
        }

        @keyframes wobble {
            0%,100% { transform: translate(0px, 0px) rotate(-12deg); }
            50% { transform: translate(5px, -5px) rotate(-8deg); }
        }

        @keyframes blinkFloat {
            0% { opacity: 0.7; text-shadow: 0 0 2px red; }
            100% { opacity: 1; text-shadow: 0 0 8px lime; }
        }

        /* custom scrollbar madness */
        ::-webkit-scrollbar {
            width: 12px;
            background: #2b1e2f;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#ff66cc, #ffcc44);
            border-radius: 0px;
        }
        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem;
            border-top: 2px dashed #ff66aa;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
<div class="static-grain"></div>
<div class="floating-junk">⚠️ CORRUPTED MEMORY ⚠️</div>
<div class="floating-junk2">💀 DUMPSTER FIRE 💀</div>

<div class="chaos-container">
    <header class="dump-header">
        <h1 class="glitch">DIGITAL DUMP // UNHINGED BLOG</h1>
        <div class="subdump">✦ MESSY ARCHIVE ✦ GLITCHED THOUGHTS ✦ NO RULES ✦</div>
    </header>

    <div class="two-columns">
        <!-- BLOG SECTION -->
        <div class="blog-posts-area">
            <h2 class="section-title">⎯⎯ BLOG ⎯⎯ UNFILTERED RANTS</h2>
            <div id="blogGrid" class="blog-grid">
                <!-- dynamic blog posts injected via JS -->
            </div>
            <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
                <button id="randomBlogBtn" class="chaos-btn">+ ADD CHAOS POST +</button>
            </div>
        </div>

        <!-- DIGITAL DUMP ZONE -->
        <div class="dump-zone">
            <h2 class="section-title">🗑️ DIGITAL DUMP 🗑️</h2>
            <div id="dumpContainer" class="dump-container">
                <!-- dynamic dump notes will appear -->
            </div>
            <div class="dump-input-group">
                <input type="text" id="dumpInput" placeholder="type your deranged thought...">
                <button id="addDumpBtn" class="chaos-btn">DUMP IT</button>
                <button id="randomDumpBtn" class="chaos-btn">⚡ RANDOM DUMP ⚡</button>
            </div>
        </div>
    </div>

    <!-- UNHINGED TOOLBAR -->
    <div class="chaos-toolbar">
        <button id="messUpBtn" class="glitch-btn">🌀 MESS UP LAYOUT 🌀</button>
        <button id="glitchStormBtn" class="glitch-btn">⚡ GLITCH STORM ⚡</button>
        <button id="resetMessBtn" class="glitch-btn">⟳ RESET CHAOS ⟳</button>
    </div>
    <footer>
        ★ DIGITAL DUMP v.∞ — everything is temporary, embrace the mess ★
    </footer>
</div>

<!-- External JS (fully functional, messy event handlers & chaos) -->
<script>
    // --------------------------------------------------------------
    // EXTERNAL SCRIPT.JS — UNHINGED DYNAMICS, BLOG + DUMP + CHAOS MAGIC
    // --------------------------------------------------------------

    // ----- DATA & STATE -----
    // initial blog posts
    const initialBlogs = [
        { title: "my descent into CSS hell", excerpt: "I spent 47 hours aligning a div. It still rotates. The matrix owns me now. Also glitch aesthetics are a cry for help.", date: "04.02.25 — 3:33AM" },
        { title: "on the verge of digital madness", excerpt: "Why do we blog? To scream into the void. This void screams back in comic sans. I'm collecting broken pixels.", date: "03.28.25 — 23:59" },
        { title: "how I lost my mind to WebGL", excerpt: "Shaders made me see god. It was a 404 error. Anyway here's a random cube that bleeds neon.", date: "03.15.25 — 13:37" }
    ];

    // random dump phrases (for random dump button)
    const randomDumpIdeas = [
        "💾 My hard drive is whispering lullabies",
        "🐱 cat stepped on keyboard -> new philosophy",
        "🔮 CSS grid is a cult and I joined",
        "🧠 BRAIN WORMS: glitch everything",
        "📀 Windows XP nostalgia but make it cursed",
        "🤡 this button does absolutely nothing (or does it?)",
        "✨ digital hoarder core ✨",
        "🍕 pizza + code = divine chaos",
        "🎭 persona non grata in the metaverse",
        "💀 dumpster rat aesthetic ON"
    ];

    // Helper: random rotation between -3deg and 6deg
    function applyRandomRotation(element) {
        if(!element) return;
        const rot = (Math.random() * 9 - 3).toFixed(1);
        element.style.setProperty('--rot', `${rot}deg`);
    }

    // create blog post element with remove functionality
    function createBlogPostElement(title, excerpt, date) {
        const article = document.createElement('article');
        article.className = 'blog-card';
        const rotVal = (Math.random() * 8 - 3).toFixed(1);
        article.style.setProperty('--rot', `${rotVal}deg`);
        
        const delBtn = document.createElement('button');
        delBtn.textContent = '✖';
        delBtn.classList.add('delete-btn');
        delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            article.remove();
            // visual mess feedback
            triggerMicroChaos();
        });
        
        const titleEl = document.createElement('h3');
        titleEl.className = 'blog-title';
        titleEl.textContent = title;
        const metaEl = document.createElement('div');
        metaEl.className = 'blog-meta';
        metaEl.textContent = date || `🗓️ ${new Date().toLocaleDateString()} — ${new Date().toLocaleTimeString()}`;
        const excerptEl = document.createElement('div');
        excerptEl.className = 'blog-excerpt';
        excerptEl.textContent = excerpt;
        
        article.appendChild(delBtn);
        article.appendChild(titleEl);
        article.appendChild(metaEl);
        article.appendChild(excerptEl);
        
        return article;
    }
    
    // add blog post to grid
    function addBlogPostToGrid(title, excerpt, date) {
        const blogGrid = document.getElementById('blogGrid');
        if(!blogGrid) return;
        const newPost = createBlogPostElement(title, excerpt, date);
        blogGrid.prepend(newPost);
        // extra messy: slight shake on add
        newPost.style.transform = 'scale(1.02)';
        setTimeout(() => { newPost.style.transform = ''; }, 200);
    }
    
    // initialize blog section with initial data
    function initBlog() {
        const blogGrid = document.getElementById('blogGrid');
        if(!blogGrid) return;
        blogGrid.innerHTML = '';
        initialBlogs.forEach(blog => {
            const postEl = createBlogPostElement(blog.title, blog.excerpt, blog.date);
            blogGrid.appendChild(postEl);
        });
    }
    
    // ----- DUMP LOGIC (sticky notes) -----
    function createDumpNote(text) {
        const dumpDiv = document.createElement('div');
        dumpDiv.className = 'dump-note';
        const rot = (Math.random() * 10 - 4).toFixed(1);
        dumpDiv.style.setProperty('--rot', `${rot}deg`);
        
        const textSpan = document.createElement('span');
        textSpan.className = 'dump-text';
        textSpan.textContent = text;
        
        const removeBtn = document.createElement('button');
        removeBtn.textContent = '✖';
        removeBtn.classList.add('remove-dump');
        removeBtn.style.position = 'absolute';
        removeBtn.style.top = '6px';
        removeBtn.style.right = '8px';
        removeBtn.style.width = '24px';
        removeBtn.style.height = '24px';
        removeBtn.style.fontSize = '12px';
        removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dumpDiv.remove();
            // little shake effect on parent
            const container = document.getElementById('dumpContainer');
            if(container) container.style.transform = 'translateX(2px)';
            setTimeout(() => { if(container) container.style.transform = ''; }, 80);
        });
        
        dumpDiv.appendChild(textSpan);
        dumpDiv.appendChild(removeBtn);
        return dumpDiv;
    }
    
    function addDumpToContainer(text) {
        if(!text || text.trim() === "") text = "💀 empty dump but still valid 💀";
        const container = document.getElementById('dumpContainer');
        if(!container) return;
        const newNote = createDumpNote(text.slice(0, 160));
        container.prepend(newNote);
        // add small floating chaos
        newNote.style.transform = 'scale(0.98)';
        setTimeout(() => { newNote.style.transform = ''; }, 150);
    }
    
    function initDumpWithRandom() {
        const container = document.getElementById('dumpContainer');
        if(!container) return;
        container.innerHTML = '';
        const starterDumps = [
            "📌 remember: milk, eggs, chaos",
            "🔥 delete system32 for inner peace",
            "🎨 this page bleeds CSS",
            "🧩 unhinged dump #1: I'm a raccoon"
        ];
        starterDumps.forEach(txt => {
            container.appendChild(createDumpNote(txt));
        });
    }
    
    // ---- CHAOS FUNCTIONS (unhinged) ----
    function randomRotateAllCards() {
        const allCards = document.querySelectorAll('.blog-card, .dump-note');
        allCards.forEach(card => {
            const newRot = (Math.random() * 12 - 5).toFixed(1);
            card.style.setProperty('--rot', `${newRot}deg`);
            if(Math.random() > 0.7) {
                card.style.filter = `hue-rotate(${Math.random() * 60}deg)`;
                setTimeout(() => { card.style.filter = ''; }, 300);
            }
        });
    }
    
    // glitch storm: temporary background color flash and margin twitch
    function glitchStorm() {
        const body = document.body;
        body.style.animation = 'none';
        body.style.backgroundColor = `#${Math.floor(Math.random()*16777215).toString(16)}33`;
        setTimeout(() => { body.style.backgroundColor = ''; }, 200);
        const allItems = document.querySelectorAll('.blog-card, .dump-note, .dump-header');
        allItems.forEach((el, idx) => {
            if(Math.random() > 0.5) {
                el.style.transform = `translate(${Math.random() * 6 - 3}px, ${Math.random() * 6 - 3}px)`;
                setTimeout(() => { el.style.transform = ''; }, 120);
            }
        });
        const glitchText = document.querySelector('.glitch');
        if(glitchText) {
            glitchText.style.textShadow = `8px 8px 0 red, -4px -4px 0 blue`;
            setTimeout(() => { glitchText.style.textShadow = ''; }, 150);
        }
        triggerMicroChaos();
    }
    
    function triggerMicroChaos() {
        // tiny random vibration for half second
        const container = document.querySelector('.chaos-container');
        if(container) {
            container.style.transform = 'translateX(3px)';
            setTimeout(() => { container.style.transform = ''; }, 70);
        }
    }
    
    function messUpLayout() {
        // apply extreme rotations + random margins
        const blogs = document.querySelectorAll('.blog-card');
        const dumps = document.querySelectorAll('.dump-note');
        [...blogs, ...dumps].forEach(el => {
            const crazyRot = (Math.random() * 14 - 6).toFixed(1);
            el.style.setProperty('--rot', `${crazyRot}deg`);
            if(Math.random() > 0.6) {
                el.style.marginLeft = `${Math.random() * 20 - 10}px`;
                el.style.marginRight = `${Math.random() * 20 - 10}px`;
            }
        });
        const header = document.querySelector('.dump-header');
        if(header) header.style.transform = 'rotate(1deg) skewX(2deg)';
        setTimeout(() => {
            if(header) header.style.transform = '';
        }, 800);
    }
    
    function resetMessLayout() {
        const allRotElements = document.querySelectorAll('.blog-card, .dump-note');
        allRotElements.forEach(el => {
            const normalRot = (Math.random() * 6 - 2).toFixed(1);
            el.style.setProperty('--rot', `${normalRot}deg`);
            el.style.marginLeft = '';
            el.style.marginRight = '';
            el.style.filter = '';
        });
        const header = document.querySelector('.dump-header');
        if(header) header.style.transform = '';
        triggerMicroChaos();
    }
    
    // random blog post generator (unhinged content)
    function generateRandomBlogPost() {
        const titles = [
            "i accidentally deleted the matrix", 
            "css: love story with extra steps", 
            "the void replied with 418 I'm a teapot",
            "burnout speedrun any%",
            "my blog is screaming in binary"
        ];
        const excerpts = [
            "I drank 6 coffees and now the page elements are dancing. maybe it's a feature.",
            "glitched reality: turns out z-index is a lie. we live in a simulation.",
            "today i fought with flexbox and lost. but victory tastes like broken margins.",
            "digital dump core: i archived 2000 tabs and my soul. worth it.",
            "javascript event loop is just a metaphor for my sanity. rotating."
        ];
        const randomTitle = titles[Math.floor(Math.random() * titles.length)];
        const randomExcerpt = excerpts[Math.floor(Math.random() * excerpts.length)];
        const randomDate = `🔥 ${new Date().toLocaleDateString()} — ${Math.floor(Math.random() * 24)}:${Math.floor(Math.random() * 60)} 🔥`;
        addBlogPostToGrid(randomTitle, randomExcerpt, randomDate);
    }
    
    // random dump from idea list
    function addRandomDumpIdea() {
        const idea = randomDumpIdeas[Math.floor(Math.random() * randomDumpIdeas.length)];
        addDumpToContainer(idea);
    }
    
    // custom user dump
    function addUserDump() {
        const inputField = document.getElementById('dumpInput');
        if(inputField && inputField.value.trim() !== "") {
            addDumpToContainer(inputField.value.trim());
            inputField.value = "";
        } else {
            addDumpToContainer("⚠️ empty scream? here's digital silence ⚠️");
        }
    }
    
    // ---- INIT EVENT LISTENERS ----
    document.addEventListener('DOMContentLoaded', () => {
        initBlog();
        initDumpWithRandom();
        
        // randomize initial rotations for all existing items
        setTimeout(() => {
            document.querySelectorAll('.blog-card, .dump-note').forEach(card => {
                const r = (Math.random() * 8 - 3).toFixed(1);
                card.style.setProperty('--rot', `${r}deg`);
            });
        }, 50);
        
        // button binds
        const randomBlogBtn = document.getElementById('randomBlogBtn');
        if(randomBlogBtn) randomBlogBtn.addEventListener('click', () => generateRandomBlogPost());
        
        const addDumpBtn = document.getElementById('addDumpBtn');
        if(addDumpBtn) addDumpBtn.addEventListener('click', () => addUserDump());
        
        const randomDumpBtn = document.getElementById('randomDumpBtn');
        if(randomDumpBtn) randomDumpBtn.addEventListener('click', () => addRandomDumpIdea());
        
        const messUpBtn = document.getElementById('messUpBtn');
        if(messUpBtn) messUpBtn.addEventListener('click', () => messUpLayout());
        
        const glitchStormBtn = document.getElementById('glitchStormBtn');
        if(glitchStormBtn) glitchStormBtn.addEventListener('click', () => glitchStorm());
        
        const resetMessBtn = document.getElementById('resetMessBtn');
        if(resetMessBtn) resetMessBtn.addEventListener('click', () => resetMessLayout());
        
        // double click anywhere generates tiny random dump? extra unhinged
        document.body.addEventListener('dblclick', (e) => {
            if(e.target.closest('.delete-btn') || e.target.closest('.remove-dump')) return;
            addDumpToContainer(`💢 DOUBLE CLICK CHAOS: ${Math.random().toString(36).substring(4,10)} 💢`);
        });
        
        // add hover glitch effect to buttons
        const allBtns = document.querySelectorAll('button');
        allBtns.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                btn.style.transform = 'skewX(-3deg)';
                setTimeout(() => { btn.style.transform = ''; }, 120);
            });
        });
    });
</script>
</body>
</html>
